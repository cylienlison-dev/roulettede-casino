<!DOCTYPE html>
<html lang="fr" class="h-full bg-neutral-950 text-neutral-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mine Royale - Premium Edition</title>
    <!-- Tailwind CSS pour un design moderne ultra-rapide -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome pour des icônes professionnelles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-full font-sans antialiased selection:bg-amber-500 selection:text-black">

    <div class="flex flex-col h-full max-w-md mx-auto bg-neutral-900 shadow-2xl overflow-hidden border-x border-neutral-800">
        
        <!-- HEADER / STATS PANEL -->
        <header class="p-6 bg-neutral-950 border-b border-neutral-800 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black tracking-wider text-amber-500 uppercase">Mine Royale</h1>
                <p class="text-xs text-neutral-400">Version 2.0 • Production</p>
            </div>
            <div class="text-right">
                <div class="text-2xl font-mono font-bold text-white flex items-center justify-end gap-2">
                    <i class="fa-solid solid fa-cube text-neutral-400"></i>
                    <span id="global-coal">0</span>
                </div>
                <p class="text-xs text-emerald-400 font-medium">+<span id="global-cps">0</span>/s</p>
            </div>
        </header>

        <!-- MAIN VIEW (SCROLLABLE) -->
        <main class="flex-1 overflow-y-auto p-4 space-y-6 pb-24">
            
            <!-- SECTION ACTION : MINE -->
            <section id="mine-pane" class="space-y-4">
                <button id="main-click-btn" class="w-full aspect-[2/1] bg-gradient-to-br from-neutral-800 to-neutral-900 border border-neutral-700 rounded-2xl flex flex-col items-center justify-center gap-3 transition-all duration-100 active:scale-95 shadow-lg group">
                    <div class="w-16 h-16 rounded-full bg-neutral-950 flex items-center justify-center border border-neutral-800 group-hover:border-amber-500/50 transition-colors">
                        <i class="fa-solid fa-pickaxe text-2xl text-amber-500 group-hover:rotate-12 transition-transform"></i>
                    </div>
                    <span class="text-sm font-bold uppercase tracking-widest text-neutral-300 group-hover:text-white">Extraire du charbon</span>
                </button>
            </section>

            <!-- SECTION CASINO : ROULETTE -->
            <section class="bg-neutral-950/50 border border-neutral-800 rounded-2xl p-4 space-y-4">
                <div class="flex justify-between items-center border-b border-neutral-800 pb-2">
                    <h2 class="text-sm font-bold uppercase tracking-wider text-neutral-400"><i class="fa-solid fa-circle-dashed text-red-500 mr-2"></i>Roulette Royale</h2>
                    <span id="roulette-status" class="text-xs text-neutral-500 font-mono">Prêt</span>
                </div>

                <!-- Visuel de la Roue -->
                <div class="relative w-44 h-44 mx-auto flex items-center justify-center">
                    <div id="wheel-pointer" class="absolute -top-1 left-1/2 -translate-x-1/2 z-10 w-0 h-0 border-l-[10px] border-l-transparent border-r-[10px] border-r-transparent border-t-[15px] border-t-amber-500 filter drop-shadow"></div>
                    <div id="casino-wheel" class="w-full h-full rounded-full border-4 border-amber-600 shadow-2xl relative overflow-hidden bg-neutral-900"></div>
                </div>

                <!-- Interface de Mise -->
                <div class="space-y-3">
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[10px] uppercase tracking-wider text-neutral-500 mb-1">Numéro (0-36)</label>
                            <input type="number" id="bet-target" min="0" max="36" value="7" class="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-3 py-2 text-sm font-mono font-bold text-center focus:outline-none focus:border-amber-500">
                        </div>
                        <div>
                            <label class="block text-[10px] uppercase tracking-wider text-neutral-500 mb-1">Montant à miser</label>
                            <div class="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-3 py-2 text-sm font-mono font-bold text-center" id="display-bet-amount">0</div>
                        </div>
                    </div>

                    <!-- Jetons de Casino -->
                    <div class="flex justify-center gap-2 pt-1" id="chips-container">
                        <button class="chip-btn bg-blue-600 text-white" data-amount="10">10</button>
                        <button class="chip-btn bg-green-600 text-white" data-amount="100">100</button>
                        <button class="chip-btn bg-purple-600 text-white" data-amount="1000">1K</button>
                        <button class="chip-btn bg-red-600 text-white" data-amount="1000000">1M</button>
                        <button id="clear-bet-btn" class="w-10 h-10 rounded-full border border-neutral-700 flex items-center justify-center text-xs text-neutral-400 active:scale-90"><i class="fa-solid fa-trash-can"></i></button>
                    </div>

                    <button id="spin-btn" class="w-full bg-amber-500 hover:bg-amber-600 active:scale-[0.98] text-neutral-950 font-black text-sm uppercase tracking-widest py-3.5 rounded-xl transition-all shadow-lg shadow-amber-500/10">Lancer la roue</button>
                </div>
            </section>

            <!-- SECTION UPGRADES / BOUTIQUE -->
            <section class="space-y-3">
                <h2 class="text-sm font-bold uppercase tracking-wider text-neutral-400 border-b border-neutral-800 pb-2"><i class="fa-solid fa-shop text-amber-500 mr-2"></i>Infrastructures & Automatisation</h2>
                <div id="upgrades-list" class="space-y-2.5">
                    <!-- Généré dynamiquement en JS -->
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
