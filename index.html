<!DOCTYPE html>
<html lang="fr" class="h-full bg-neutral-950 text-neutral-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roulette Royale - Salon Privé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-full font-sans antialiased bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-stone-900 via-neutral-950 to-neutral-950 flex items-center justify-center p-3 sm:p-6">

    <div class="w-full max-w-5xl bg-gradient-to-b from-neutral-900 to-neutral-950 shadow-[0_0_60px_rgba(0,0,0,0.8)] rounded-[32px] overflow-hidden border border-amber-600/20 flex flex-col">
        
        <header class="p-6 bg-neutral-950/80 backdrop-blur border-b border-neutral-800/60 flex justify-between items-center">
            <div>
                <h1 class="text-xl sm:text-2xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-amber-400 via-yellow-200 to-amber-500 uppercase flex items-center gap-3">
                    <i class="fa-solid fa-crown text-amber-500 drop-shadow-[0_2px_8px_rgba(245,158,11,0.4)]"></i> Roulette Royale
                </h1>
                <p class="text-[10px] tracking-widest text-neutral-500 uppercase font-medium">Salon Privé • Édition Haute Définition</p>
            </div>
            
            <div class="bg-neutral-900/90 border border-neutral-800 rounded-2xl px-5 py-2.5 shadow-inner text-right min-w-[140px]">
                <p class="text-[9px] uppercase tracking-widest text-amber-500/70 font-bold mb-0.5">Votre Solde</p>
                <div class="text-xl sm:text-2xl font-mono font-black text-white flex items-center justify-end gap-2">
                    <span id="global-balance">1000</span>
                    <i class="fa-solid fa-circle text-amber-400 text-xs shadow-sm"></i>
                </div>
            </div>
        </header>

        <main class="flex-1 p-5 sm:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8 items-center">
            
            <div class="lg:col-span-7 flex flex-col items-center justify-center space-y-5 py-6 bg-emerald-950/10 rounded-[24px] border border-emerald-500/10 p-4 relative shadow-inner">
                
                <div class="relative w-72 h-72 sm:w-[400px] sm:h-[400px] flex items-center justify-center rounded-full shadow-[0_25px_50px_-12px_rgba(0,0,0,0.9)] bg-neutral-950">
                    
                    <div id="wheel-pointer" class="absolute -top-3 left-1/2 -translate-x-1/2 z-20 w-0 h-0 border-l-[14px] border-l-transparent border-r-[14px] border-r-transparent border-t-[22px] border-t-amber-400 filter drop-shadow-[0_4px_6px_rgba(0,0,0,0.6)]"></div>
                    
                    <canvas id="roulette-canvas" class="w-full h-full rounded-full transition-transform duration-[5000s] cubic-bezier(0.1, 0.85, 0.1, 1)" style="transform: rotate(0deg);"></canvas>
                </div>

                <div id="roulette-status" class="px-6 py-2.5 bg-neutral-950/90 border border-neutral-800 rounded-full text-xs font-mono font-bold text-neutral-400 tracking-wider shadow-md min-w-[240px] text-center">
                    FAITES VOS JEUX...
                </div>
            </div>

            <div class="lg:col-span-5 space-y-6 w-full">
                
                <div class="bg-neutral-950/40 border border-neutral-800/80 backdrop-blur rounded-2xl p-6 space-y-6 shadow-xl">
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] uppercase tracking-widest text-neutral-400 font-bold mb-2">Choisir Numéro (0-36)</label>
                            <input type="number" id="bet-target" min="0" max="36" value="7" class="w-full bg-neutral-900/80 border-2 border-neutral-800 focus:border-amber-500 rounded-xl px-3 py-3 text-xl font-mono font-black text-center focus:outline-none text-white transition-all shadow-inner">
                        </div>
                        <div>
                            <label class="block text-[10px] uppercase tracking-widest text-neutral-400 font-bold mb-2">Mise sur la table</label>
                            <div class="w-full bg-neutral-900/50 border-2 border-dashed border-neutral-800 rounded-xl px-3 py-3 text-xl font-mono font-black text-center text-amber-400 flex items-center justify-center shadow-inner">
                                <span id="display-bet-amount">0</span>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] uppercase tracking-widest text-neutral-400 font-bold mb-3 text-center">Ajouter des jetons de valeur</label>
                        <div class="flex justify-center gap-3" id="chips-container">
                            <button class="w-12 h-12 rounded-full bg-blue-600 hover:bg-blue-500 text-white font-black text-xs border-4 border-dashed border-white/40 shadow-lg transform active:scale-90 transition-all flex items-center justify-center" data-amount="10">10</button>
                            <button class="w-12 h-12 rounded-full bg-green-600 hover:bg-green-500 text-white font-black text-xs border-4 border-dashed border-white/40 shadow-lg transform active:scale-90 transition-all flex items-center justify-center" data-amount="50">50</button>
                            <button class="w-12 h-12 rounded-full bg-purple-600 hover:bg-purple-500 text-white font-black text-xs border-4 border-dashed border-white/40 shadow-lg transform active:scale-90 transition-all flex items-center justify-center" data-amount="100">100</button>
                            <button class="w-12 h-12 rounded-full bg-red-600 hover:bg-red-500 text-white font-black text-xs border-4 border-dashed border-white/40 shadow-lg transform active:scale-90 transition-all flex items-center justify-center" data-amount="500">500</button>
                            
                            <button id="clear-bet-btn" class="w-12 h-12 rounded-full border border-neutral-700 bg-neutral-900 text-neutral-400 hover:text-red-400 hover:border-red-500/50 transition-all active:scale-90 flex items-center justify-center shadow-md shadow-black" title="Ramasser la mise">
                                <i class="fa-solid fa-arrow-rotate-left"></i>
                            </button>
                        </div>
                    </div>

                    <button id="spin-btn" class="w-full bg-gradient-to-r from-amber-500 via-yellow-400 to-amber-600 hover:from-amber-600 hover:to-amber-700 active:scale-[0.99] text-neutral-950 font-black text-sm sm:text-base uppercase tracking-widest py-4 rounded-xl transition-all shadow-[0_4px_20px_rgba(245,158,11,0.2)] flex items-center justify-center gap-2">
                        <i class="fa-solid fa-play text-xs"></i> Lancer le Cylindre
                    </button>
                </div>

                <div class="bg-neutral-950/60 border border-neutral-800/80 rounded-xl p-4 space-y-2.5 shadow-md">
                    <p class="text-[9px] uppercase tracking-widest text-neutral-500 font-bold"><i class="fa-solid fa-clock-rotate-left mr-1"></i> Derniers numéros tirés</p>
                    <div id="history-container" class="flex items-center gap-2 overflow-hidden h-9">
                        <span class="text-xs text-neutral-600 italic">Aucun tirage pour le moment</span>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
